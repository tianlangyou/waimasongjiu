<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0558b4">
<title>歪马送酒 · 门店订冰</title>
<style>
  :root {
    --blue:      #0558b4;
    --blue-mid:  #0d7ee8;
    --blue-light:#e8f3ff;
    --ice:       #f0f8ff;
    --gold:      #ffd400;
    --green:     #0fa854;
    --text:      #0c1f3a;
    --sub:       #526a88;
    --border:    #cce3f8;
    --radius:    16px;
    --shadow:    0 4px 20px rgba(5,88,180,.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--ice);
    color: var(--text);
    min-height: 100vh;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 160px;
  }

  /* Hero */
  .hero {
    background: linear-gradient(145deg, #0558b4 0%, #0d9bef 100%);
    padding: 20px 18px 22px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,.07);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
  }
  .hero-inner { position: relative; z-index: 1; }
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,.75);
    letter-spacing: .06em;
  }
  .hero-title {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-top: 2px;
  }
  .logo-badge {
    background: var(--gold);
    color: #111;
    font-weight: 900;
    font-size: 13px;
    border-radius: 10px;
    padding: 8px 12px;
    text-align: center;
    line-height: 1.15;
    flex-shrink: 0;
  }
  .hero-desc {
    font-size: 13px;
    color: rgba(255,255,255,.82);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* Notice */
  .notice {
    margin: 14px 14px 0;
    background: #fff9e6;
    border: 1px solid #ffe99a;
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 13px;
    color: #7a4b00;
    font-weight: 600;
    line-height: 1.6;
  }
  .notice strong { color: #c04a00; }

  /* Section */
  .section-title {
    font-size: 15px;
    font-weight: 800;
    color: var(--blue);
    padding: 16px 14px 8px;
    letter-spacing: .02em;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 15px;
    background: var(--blue-mid);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Form */
  .form-card {
    margin: 0 14px;
    background: #fff;
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-row { display: flex; gap: 8px; }
  .form-row .field { flex: 1; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    margin-bottom: 4px;
    letter-spacing: .04em;
  }
  .field input,
  .field textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--blue-light);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .field input:focus,
  .field textarea:focus { border-color: var(--blue-mid); background: #fff; }
  .field textarea { height: 68px; resize: none; line-height: 1.5; }

  /* Products */
  .products { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .product-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid transparent;
    transition: border-color .2s, box-shadow .2s;
  }
  .product-card.active {
    border-color: #9dcaf4;
    box-shadow: 0 4px 20px rgba(5,88,180,.18);
  }
  .product-img {
    width: 78px;
    height: 78px;
    object-fit: contain;
    border-radius: 10px;
    background: var(--blue-light);
    flex-shrink: 0;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
  .product-spec { font-size: 12px; color: var(--sub); margin-bottom: 5px; }
  .product-price { font-size: 15px; font-weight: 900; color: var(--blue); }
  .product-price .unit { font-size: 11px; font-weight: 600; }
  .product-subtotal { font-size: 12px; color: var(--green); font-weight: 700; min-height: 16px; margin-top: 1px; }
  .qty-ctrl { display: flex; align-items: center; flex-shrink: 0; }
  .qty-btn {
    width: 32px; height: 32px;
    border: none;
    border-radius: 8px;
    font-size: 20px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
    line-height: 1;
    padding: 0;
  }
  .qty-btn:active { opacity: .7; }
  .btn-minus { background: #e8f0fe; color: var(--blue); }
  .btn-plus  { background: var(--blue); color: #fff; }
  .qty-input {
    width: 40px; height: 32px;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    -moz-appearance: textfield;
    outline: none;
    font-family: inherit;
    padding: 0;
  }
  .qty-input::-webkit-inner-spin-button,
  .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* Order box */
  .order-box {
    display: none;
    margin: 14px 14px 0;
    background: #fff;
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
  }
  .order-box.visible { display: block; }
  .order-label { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 8px; }
  .order-text {
    width: 100%;
    height: 200px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--ice);
    padding: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    resize: none;
    outline: none;
    font-family: inherit;
  }
  .copy-btn {
    width: 100%;
    height: 44px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: var(--green);
    color: #fff;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: .04em;
  }
  .copy-btn:active { opacity: .85; }

  /* Footer */
  .footer-fixed {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    box-shadow: 0 -6px 24px rgba(5,88,180,.1);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .footer-inner { max-width: 480px; margin: 0 auto; }
  .summary-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .summary-count { font-size: 13px; color: var(--sub); font-weight: 600; }
  .summary-count span { font-weight: 900; color: var(--text); }
  .min-order-hint { font-size: 12px; font-weight: 700; margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; text-align: center; transition: background .3s, color .3s; }
  .min-order-hint.lack { background: #fff3cd; color: #a05a00; }
  .min-order-hint.met  { background: #d4f5e2; color: #0a6e35; }
  .summary-amount { font-size: 20px; font-weight: 900; color: var(--blue); }
  .amount-unit { font-size: 13px; font-weight: 700; }
  .btn-row { display: flex; gap: 10px; }
  .btn-generate {
    flex: 1; height: 48px;
    border: none;
    border-radius: 12px;
    background: var(--blue);
    color: #fff;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: .04em;
  }
  .btn-generate:active { opacity: .85; }
  .btn-reset {
    width: 80px; height: 48px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--blue-light);
    color: var(--blue);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }
  .btn-reset:active { opacity: .7; }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(.9);
    background: rgba(10,20,40,.88);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="hero-inner">
      <div class="brand-row">
        <div>
          <div class="brand-tag">冰力达食用冰系列</div>
          <div class="hero-title">歪马送酒<br>门店订冰</div>
        </div>
        <div class="logo-badge">歪马<br>送酒</div>
      </div>
      <div class="hero-desc">5件起送 · 可混搭 · 适配酒饮 / 即饮 / 聚会场景</div>
    </div>
  </div>

  <div class="notice">
    📋 <strong>下单步骤：</strong>填写门店信息 → 选择产品数量 → 点击「生成订单」→ 复制后发到微信群<br>
    订购请联系群内 <strong>@一米阳光</strong>
  </div>

  <div class="section-title">门店信息</div>
  <div class="form-card">
    <div class="field">
      <label>门店名称</label>
      <input type="text" id="storeName" placeholder="请输入门店名称">
    </div>
    <div class="form-row">
      <div class="field">
        <label>联系人</label>
        <input type="text" id="contactName" placeholder="姓名">
      </div>
      <div class="field">
        <label>联系电话</label>
        <input type="tel" id="contactPhone" placeholder="手机号">
      </div>
    </div>
    <div class="field">
      <label>配送地址 / 备注</label>
      <textarea id="address" placeholder="详细地址或特殊要求"></textarea>
    </div>
  </div>

  <div class="section-title">选择产品</div>
  <div class="products" id="productContainer"></div>

  <div class="order-box" id="orderBox">
    <div class="order-label">📄 订单预览（可编辑）</div>
    <textarea class="order-text" id="orderText" readonly></textarea>
    <button class="copy-btn" onclick="copyOrder()">📋 复制订单 · 发到微信群</button>
  </div>

</div>

<div class="footer-fixed">
  <div class="footer-inner">
    <div class="min-order-hint lack" id="minOrderHint">还差 5 件才能起送</div>
    <div class="summary-row">
      <div class="summary-count">已选 <span id="totalQty">0</span> 件</div>
      <div class="summary-amount"><span class="amount-unit">¥</span><span id="totalAmount">0.00</span></div>
    </div>
    <div class="btn-row">
      <button class="btn-generate" onclick="generateOrder()">生成订单</button>
      <button class="btn-reset" onclick="resetOrder()">清零</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { name: '220g 食用冰杯',   spec: '220g × 24杯/件',       price: 63.6,  img: 'images/220g冰力达冰杯.jpg',          qty: 0 },
  { name: '月球冰（70颗）',  spec: '140g × 12颗 × 4盒/件', price: 144,   img: 'images/单颗月球冰.png',              qty: 0 },
  { name: '1kg 食用冰袋',    spec: '1kg × 10袋/件',         price: 59,    img: 'images/1KG冰力达袋冰-正面-新.png',   qty: 0 },
  { name: '160g 柠檬冰杯',   spec: '160g × 24杯/件',        price: 94.8,  img: 'images/160g冰力达柠檬冰杯.png',      qty: 0 },
  { name: '160g 食用冰袋',   spec: '160g × 48袋/件',        price: 72,    img: 'images/160g冰力达袋冰.png',           qty: 0 },
];

const container = document.getElementById('productContainer');

function renderProducts() {
  container.innerHTML = '';
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card' + (p.qty > 0 ? ' active' : '');
    card.dataset.index = i;
    card.innerHTML = `
      <img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.style.opacity='.3'">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-spec">${p.spec}</div>
        <div class="product-price"><span class="unit">¥</span>${p.price.toFixed(1)}<span style="font-size:11px;color:var(--sub);font-weight:600;margin-left:3px">/ 件</span></div>
        <div class="product-subtotal" id="sub_${i}">${p.qty > 0 ? '小计 ¥' + (p.qty * p.price).toFixed(2) : ''}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn btn-minus" data-i="${i}">−</button>
        <input class="qty-input" type="number" min="0" value="${p.qty}" data-i="${i}">
        <button class="qty-btn btn-plus" data-i="${i}">+</button>
      </div>
    `;
    container.appendChild(card);
  });
  bindEvents();
  updateSummary();
}

function bindEvents() {
  container.querySelectorAll('.btn-minus').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      if (products[i].qty > 0) { products[i].qty--; refreshCard(i); }
    });
  });
  container.querySelectorAll('.btn-plus').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      products[i].qty++;
      refreshCard(i);
    });
  });
  container.querySelectorAll('.qty-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const i = +inp.dataset.i;
      products[i].qty = Math.max(0, parseInt(inp.value) || 0);
      inp.value = products[i].qty;
      refreshCard(i);
    });
  });
}

function refreshCard(i) {
  const p = products[i];
  const card = container.querySelector(`[data-index="${i}"]`);
  card.querySelector('.qty-input').value = p.qty;
  document.getElementById('sub_' + i).textContent = p.qty > 0 ? '小计 ¥' + (p.qty * p.price).toFixed(2) : '';
  card.className = 'product-card' + (p.qty > 0 ? ' active' : '');
  updateSummary();
}

function updateSummary() {
  const MIN = 5;
  let qty = 0, amt = 0;
  products.forEach(p => { qty += p.qty; amt += p.qty * p.price; });
  document.getElementById('totalQty').textContent = qty;
  document.getElementById('totalAmount').textContent = amt.toFixed(2);
  const hint = document.getElementById('minOrderHint');
  if (qty >= MIN) {
    hint.textContent = '✅ 已满 5 件，可以下单';
    hint.className = 'min-order-hint met';
  } else {
    const lack = MIN - qty;
    hint.textContent = qty === 0 ? '还差 5 件才能起送' : `再加 ${lack} 件即可起送`;
    hint.className = 'min-order-hint lack';
  }
}

function generateOrder() {
  const store   = document.getElementById('storeName').value.trim();
  const contact = document.getElementById('contactName').value.trim();
  const phone   = document.getElementById('contactPhone').value.trim();
  const addr    = document.getElementById('address').value.trim();
  const hasItems = products.some(p => p.qty > 0);

  if (!store && !hasItems) { showToast('请填写门店信息并选择产品'); return; }

  const totalQtyCheck = products.reduce((s, p) => s + p.qty, 0);
  if (totalQtyCheck < 5) {
    showToast(`还差 ${5 - totalQtyCheck} 件，满5件才能起送`);
    return;
  }

  let text = '【歪马送酒门店订货单】\n';
  text += '─────────────────────\n';
  if (store)   text += `门店：${store}\n`;
  if (contact) text += `联系人：${contact}\n`;
  if (phone)   text += `电话：${phone}\n`;
  if (addr)    text += `地址：${addr}\n`;
  text += '─────────────────────\n';

  let totalQty = 0, totalAmt = 0;
  products.forEach(p => {
    if (p.qty > 0) {
      text += `${p.name}：${p.qty}件 × ¥${p.price} = ¥${(p.qty * p.price).toFixed(2)}\n`;
      totalQty += p.qty; totalAmt += p.qty * p.price;
    }
  });
  if (!hasItems) text += '（暂未选择产品）\n';

  text += '─────────────────────\n';
  text += `合计：${totalQty}件 | ¥${totalAmt.toFixed(2)}\n`;
  text += '订购联系群内 @一米阳光';

  document.getElementById('orderText').value = text;
  const box = document.getElementById('orderBox');
  box.classList.add('visible');
  setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function copyOrder() {
  const text = document.getElementById('orderText').value;
  if (!text) { showToast('请先生成订单'); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('✅ 已复制，粘贴到微信群'))
      .catch(() => fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.getElementById('orderText');
  ta.removeAttribute('readonly');
  ta.select();
  try { document.execCommand('copy'); showToast('✅ 已复制，粘贴到微信群'); } catch(e) { showToast('请手动长按复制'); }
  ta.setAttribute('readonly', '');
}

function resetOrder() {
  products.forEach(p => p.qty = 0);
  document.getElementById('orderText').value = '';
  document.getElementById('orderBox').classList.remove('visible');
  renderProducts();
  showToast('已清零');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

renderProducts();
</script>
</body>
</html>
